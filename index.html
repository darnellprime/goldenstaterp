<!DOCTYPE html>
<html>
<head>
  <title>GSRP Control Panel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h1>Manager Access</h1>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">ENTER</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" class="hidden">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>GSRP</h2>

    <button onclick="showTab('dashboard')">Dashboard</button>
    <button onclick="showTab('roster')">Roster</button>
    <button onclick="showTab('apps')">Applications</button>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- DASHBOARD -->
    <div id="dashboard" class="tab active">
      <h1>Dashboard</h1>
      <p>Welcome to the Control Panel</p>
    </div>

    <!-- ROSTER -->
    <div id="roster" class="tab">
      <h1>Roster</h1>

      <div class="card">
        <input id="name" placeholder="Name">
        <input id="callsign" placeholder="Callsign">
        <input id="dept" placeholder="Department">
        <button onclick="addMember()">Add</button>
      </div>

      <div id="rosterList"></div>
    </div>

    <!-- APPLICATIONS -->
    <div id="apps" class="tab">
      <h1>Applications</h1>
      <div id="appList"></div>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
