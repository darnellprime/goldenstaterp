<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GSRP Panel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- PARTICLES BACKGROUND -->
  <canvas id="particles"></canvas>

  <!-- HEADER -->
  <header>
    <h1>Golden State RP</h1>
  </header>

  <!-- NAV -->
  <nav>
    <button onclick="openTab('gangs')">Gangs</button>
    <button onclick="openTab('civ')">Civilian Ops</button>
    <button onclick="openTab('support')">Support</button>
    <button onclick="openTab('manager')">Manager</button>
    <button onclick="openTab('discord')">Discord</button>
  </nav>

  <!-- CONTENT -->
  <main>

    <section id="gangs" class="tab active">
      <h2>Gangs</h2>
      <p>Manage gang applications and activity.</p>
    </section>

    <section id="civ" class="tab">
      <h2>Civilian Operations</h2>
    </section>

    <section id="support" class="tab">
      <h2>Support Tickets</h2>
    </section>

    <section id="manager" class="tab">
      <h2>Manager Panel</h2>
      <p>Restricted tools (no login required for now)</p>
    </section>

    <section id="discord" class="tab">
      <h2>Discord</h2>
      <a href="#">Join Discord</a>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
