<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GSRP Panel</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- BACKGROUND PARTICLES -->
<canvas id="particles"></canvas>

<!-- HEADER -->
<header>
  Golden State RP
</header>

<!-- NAV -->
<nav>
  <button onclick="openTab('home')">Home</button>
  <button onclick="openTab('gangs')">Gangs</button>
  <button onclick="openTab('civ')">Civilian</button>
  <button onclick="openTab('support')">Support</button>
  <button onclick="openTab('manager')">Manager</button>
</nav>

<!-- CONTENT -->
<main>

  <div id="home" class="tab active">
    <div class="card">
      <h2>Welcome</h2>
      <p>Golden State Roleplay Control Panel</p>
    </div>
  </div>

  <div id="gangs" class="tab">
    <div class="card">
      <h2>Gangs</h2>
      <p>Gang applications and management.</p>
    </div>
  </div>

  <div id="civ" class="tab">
    <div class="card">
      <h2>Civilian Operations</h2>
    </div>
  </div>

  <div id="support" class="tab">
    <div class="card">
      <h2>Support</h2>
      <p>Tickets and assistance.</p>
    </div>
  </div>

  <div id="manager" class="tab">
    <div class="card">
      <h2>Manager Panel</h2>
      <p>Administrative controls.</p>
    </div>
  </div>

</main>

<script src="script.js"></script>
</body>
</html>
