<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Golden State RP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI';}

body{
background:#000;
color:#fff;
overflow:hidden;
}

/* DARK GOLD UI */
.bg{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#000;
z-index:-3;
overflow:hidden;
}

/* PIXEL BRIDGE ANIMATION */
.bridge{
position:absolute;
width:200%;
height:200%;
background:
linear-gradient(90deg, transparent 49%, #111 50%, transparent 51%),
linear-gradient(#111 1px, transparent 1px);
background-size:40px 40px;
opacity:0.2;
animation:move 20s linear infinite;
}

@keyframes move{
0%{transform:translate(0,0)}
100%{transform:translate(-200px,-200px)}
}

/* GOLD GLOW */
.overlay{
position:absolute;
width:100%;
height:100%;
background:radial-gradient(circle at center,#ffd70022,transparent);
}

/* LAYOUT */
.container{display:flex;height:100vh}

/* SIDEBAR */
.sidebar{
width:240px;
background:rgba(5,5,5,0.9);
backdrop-filter:blur(20px);
padding:20px;
border-right:1px solid rgba(255,215,0,0.1);
}

.logo{
font-size:22px;
color:#ffd700;
margin-bottom:30px;
text-shadow:0 0 15px gold;
}

.nav-link{
padding:12px;
margin-bottom:10px;
border-radius:10px;
cursor:pointer;
transition:.3s;
color:#aaa;
}

.nav-link:hover{
background:rgba(255,215,0,0.1);
color:#fff;
}

.nav-link.active{
background:linear-gradient(90deg,#ffd700,#8a6d00);
color:#000;
}

/* MAIN */
.main{
flex:1;
padding:25px;
overflow-y:auto;
}

/* CARDS */
.card{
background:rgba(10,10,10,0.8);
backdrop-filter:blur(15px);
border:1px solid rgba(255,215,0,0.1);
border-radius:15px;
padding:20px;
margin-bottom:20px;
}

/* BUTTON */
.btn{
padding:10px 15px;
border-radius:10px;
border:none;
cursor:pointer;
font-weight:bold;
background:linear-gradient(90deg,#ffd700,#8a6d00);
color:#000;
}

input,textarea{
width:100%;
margin-top:10px;
padding:10px;
border-radius:8px;
background:#050505;
color:#fff;
border:1px solid rgba(255,215,0,0.2);
}

textarea{min-height:80px}

/* TABS */
.tab{display:none}
.tab.active{display:block}
.form{display:none}

</style>
</head>

<body>

<div class="bg">
<div class="bridge"></div>
<div class="overlay"></div>
</div>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
<div class="logo">GSRP</div>

<div class="nav-link active" data-tab="home">🏠 Home</div>
<div class="nav-link" data-tab="gangs">🔫 Gangs</div>
<div class="nav-link" data-tab="departments">🚓 Departments</div>

</div>

<!-- MAIN -->
<div class="main">

<!-- HOME -->
<div id="home" class="tab active">
<div class="card">
<h2>Golden State RP</h2>
<p>Dark RP Experience</p>
</div>
</div>

<!-- GANGS -->
<div id="gangs" class="tab">
<div class="card">
<h2>Gang Applications</h2>
<div onclick="openForm('hustlers')">400 Hustlers</div>
<div onclick="openForm('diggas')">Grave Diggas</div>
<div onclick="openForm('devils')">Los Blue Devils</div>
</div>

<div id="hustlers" class="card form">
<h3>400 Hustlers</h3>
<input id="h_name" placeholder="Name">
<input id="h_discord" placeholder="Discord ID">
<textarea id="h_text" placeholder="Why join?"></textarea>
<button class="btn" onclick="submitApp('hustlers')">Submit</button>
</div>

<div id="diggas" class="card form">
<h3>Grave Diggas</h3>
<input id="d_name">
<input id="d_discord">
<textarea id="d_text"></textarea>
<button class="btn" onclick="submitApp('diggas')">Submit</button>
</div>

<div id="devils" class="card form">
<h3>Los Blue Devils</h3>
<input id="v_name">
<input id="v_discord">
<textarea id="v_text"></textarea>
<button class="btn" onclick="submitApp('devils')">Submit</button>
</div>

</div>

<!-- DEPARTMENTS -->
<div id="departments" class="tab">
<div class="card">
<h2>Departments</h2>
<div onclick="openForm('lspd')">LSPD</div>
<div onclick="openForm('bcso')">BCSO</div>
<div onclick="openForm('sasp')">SASP</div>
</div>

<div id="lspd" class="card form">
<h3>LSPD</h3>
<input id="l_name">
<input id="l_discord">
<textarea id="l_text"></textarea>
<button class="btn" onclick="submitApp('lspd')">Submit</button>
</div>

<div id="bcso" class="card form">
<h3>BCSO</h3>
<input id="b_name">
<input id="b_discord">
<textarea id="b_text"></textarea>
<button class="btn" onclick="submitApp('bcso')">Submit</button>
</div>

<div id="sasp" class="card form">
<h3>SASP</h3>
<input id="s_name">
<input id="s_discord">
<textarea id="s_text"></textarea>
<button class="btn" onclick="submitApp('sasp')">Submit</button>
</div>

</div>

</div>
</div>

<script>

/* WEBHOOKS (SEPARATE LOGS) */
const WEBHOOKS = {
hustlers: "YOUR_HUSTLERS_WEBHOOK",
diggas: "YOUR_DIGGAS_WEBHOOK",
devils: "YOUR_DEVILS_WEBHOOK",
lspd: "YOUR_LSPD_WEBHOOK",
bcso: "YOUR_BCSO_WEBHOOK",
sasp: "YOUR_SASP_WEBHOOK"
};

/* TAB SWITCH */
document.querySelectorAll('.nav-link').forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll('.nav-link').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');

document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
document.getElementById(btn.dataset.tab).classList.add('active');
}
});

/* OPEN FORMS */
function openForm(id){
document.querySelectorAll('.form').forEach(f=>f.style.display='none');
document.getElementById(id).style.display='block';
}

/* SUBMIT APPLICATION */
function submitApp(type){

let name = document.getElementById(type[0]+"_name").value;
let discord = document.getElementById(type[0]+"_discord").value;
let text = document.getElementById(type[0]+"_text").value;

fetch(WEBHOOKS[type],{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
content:`📥 **New Application**\n\n**Type:** ${type}\n**Name:** ${name}\n**Discord:** ${discord}\n**Details:** ${text}`
})
});

alert("Application Sent!");
}

</script>

</body>
</html>
