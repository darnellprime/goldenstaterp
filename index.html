<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Control Panel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- MAIN PANEL -->
<div class="container">

  <h1>GSRP Control Panel</h1>

  <div class="tabs">
    <button onclick="openTab('roster')">Roster</button>
    <button onclick="openTab('applications')">Applications</button>
    <button onclick="openTab('logs')">Logs</button>
    <button onclick="requireManager()">Manager</button>
  </div>

  <div id="roster" class="tab">
    <h2>Roster</h2>
    <p>Roster system loading...</p>
  </div>

  <div id="applications" class="tab hidden">
    <h2>Applications</h2>
    <p>Applications system loading...</p>
  </div>

  <div id="logs" class="tab hidden">
    <h2>Logs</h2>
    <p>Logs system loading...</p>
  </div>

  <div id="managerPanel" class="tab hidden">
    <h2>Manager Panel</h2>
    <p>Restricted Access</p>
    <button onclick="logout()">Logout</button>
  </div>

</div>

<!-- LOGIN MODAL -->
<div id="loginModal" class="modal hidden">
  <div class="modal-box">
    <h2>Manager Login</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <button onclick="closeLogin()">Cancel</button>

    <p id="error" class="error"></p>

    <p class="small">Test: owner / owner123</p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
